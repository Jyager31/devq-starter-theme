name: Build and Release Theme
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create theme zip
        run: |
          mkdir -p devq-starter
          rsync -av --exclude='.git' --exclude='.github' \
                    --exclude='.claude' --exclude='CLAUDE.md' \
                    --exclude='README.md' --exclude='.gitignore' \
                    --exclude='blocks/README.md' \
                    --exclude='blocks/BLOCK-TEMPLATE.md' \
                    --exclude='devq-starter-child' \
                    ./ devq-starter/
          zip -r devq-starter.zip devq-starter/
      - uses: softprops/action-gh-release@v2
        with:
          files: devq-starter.zip
          generate_release_notes: true
